name: Deploy to EC2 with Blue-Green

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: self-hosted #  EC2에 설치된 self-hosted runner 가 이 작업을 잡게

    env:
      NODE_ENV: ${{ secrets.NODE_ENV }}
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FRONT_URL: ${{ secrets.FRONT_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
            # 환경 변수 파일 생성
            echo "NODE_ENV=$NODE_ENV" > .env
            echo "PORT=$PORT" >> .env
            echo "DATABASE_URL=$DATABASE_URL" >> .env
            echo "FRONT_URL=$FRONT_URL" >> .env
            echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
            echo "BETTER_AUTH_URL=$BETTER_AUTH_URL" >> .env

            # 리포지토리 이름을 소문자로 변환
            RAW_IMAGE_NAME="${{ github.repository }}"
            echo "GITHUB_REPOSITORY=${RAW_IMAGE_NAME,,}" >> .env
            chmod 600 .env

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Execute Blue-Green Deployment
        run: |
            # 러너의 workspace 폴더에서 직접 실행
            chmod +x deploy.sh
            ./deploy.sh

      - name: Clean up unused images
        if: always()
        run: docker image prune -af

  notify:
    name: Notify Deployment Status
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "배포 성공!"
          else
            echo "배포 실패!"
          fi
