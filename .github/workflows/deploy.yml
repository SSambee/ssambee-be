name: Deploy to EC2 with Blue-Green

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_VERSION=22

  deploy:
    name: Deploy to EC2 (Docker Swarm)
    needs: build-and-push
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          # 리포지토리 이름을 소문자로 변환 (Docker 이미지 규격 준수)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          cat <<EOF > .env
          NODE_ENV=${{ secrets.NODE_ENV }}
          PORT=${{ secrets.PORT }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          FRONT_URL=${{ secrets.FRONT_URL }}
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_DOCUMENTS=${{ secrets.AWS_S3_BUCKET_DOCUMENTS }}
          AWS_S3_BUCKET_REPORTS=${{ secrets.AWS_S3_BUCKET_REPORTS }}
          AWS_CLOUDFRONT_URL_DOCUMENTS=${{ secrets.AWS_CLOUDFRONT_URL_DOCUMENTS }}
          AWS_CLOUDFRONT_URL_REPORTS=${{ secrets.AWS_CLOUDFRONT_URL_REPORTS }}
          AWS_CLOUDFRONT_KEY_PAIR_ID=${{ secrets.AWS_CLOUDFRONT_KEY_PAIR_ID }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          ALARM_LAMBDA_URL=${{ secrets.ALARM_LAMBDA_URL }}
          GHCR_IMAGE=ghcr.io/${REPO_LOWER}:latest
          EOF
          chmod 600 .env

      - name: Sync files to app directory
        run: |
          sudo chown -R ec2-user:ec2-user /home/ec2-user/app || true
          cp -r ./* /home/ec2-user/app/
          cp .env /home/ec2-user/app/
          sudo chown -R ec2-user:ec2-user /home/ec2-user/app/
      
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Execute Swarm Deployment
        run: |
          cd /home/ec2-user/app
          chmod +x deploy.sh
          if [ "${{ github.ref_name }}" == "main" ]; then
            ./deploy.sh prod
          else
            ./deploy.sh dev
          fi

      - name: Clean up unused images
        if: always()
        run: docker image prune -af

  notify:
    name: Notify Deployment Status
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "배포 성공!"
          else
            echo "배포 실패!"
          fi
