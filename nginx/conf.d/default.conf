# 현재 활성 백엔드를 가리키는 upstream
# 배포 스크립트에서 이 파일을 수정하여 blue/green 전환
upstream backend {
    server eduops-backend-blue:4000;
    #server eduops-backend-green:4000; 
}

# HTTP로 오면 HTTPS로 강제 리다이렉트
server {
    listen 80;
    server_name api.ssambee.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.ssambee.com;

    # 인증서 경로 (Certbot이 발급해주면 이쪽 경로에  생기네)
    ssl_certificate /etc/letsencrypt/live/api.ssambee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ssambee.com/privkey.pem;

    # Rate Limit 상태 코드변경 (기본 503 -> 429) - 429는 Too Many Requests
    limit_req_status 429;
    limit_req_log_level warn; # 에러 로그에 기록되어 Fail2ban이 감지할 수 있게

    # 클라이언트 최대 업로드 크기
    client_max_body_size 100M;

    # 모든 요청을 upstream으로 전달
    location / {
        # 브라우저로 직접접속시 프론트로 리다이렉트
        if ($http_accept ~* "text/html") {
            return 301 https://www.ssambee.com;
        }

        # 순간적으로 들어오는 50개 요청까지는 대기열로 - 대기열에 있는 요청도 지연 없이 즉시
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Cookie 설정 유지
        proxy_cookie_domain api.ssambee.com .ssambee.com;
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 헬스체크 엔드포인트
    location /health {
        proxy_pass http://backend;
        access_log off;
    }

    # API 엔드포인트
    location /api {
        if ($http_accept ~* "text/html") {
            return 301 https://www.ssambee.com;
        }

        # api 요청: 더 엄격한 burst를 적용
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
