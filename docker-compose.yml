services:
  backend:
    image: ${GHCR_IMAGE:-ghcr.io/eduops-lab/ssambee-be:latest}
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT:-4000}
      - DATABASE_URL=${DATABASE_URL}
      - FRONT_URL=${FRONT_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - SENTRY_DSN=${SENTRY_DSN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      - AWS_S3_BUCKET_DOCUMENTS=${AWS_S3_BUCKET_DOCUMENTS}
      - AWS_S3_BUCKET_REPORTS=${AWS_S3_BUCKET_REPORTS}
      - AWS_CLOUDFRONT_URL_DOCUMENTS=${AWS_CLOUDFRONT_URL_DOCUMENTS}
      - AWS_CLOUDFRONT_URL_REPORTS=${AWS_CLOUDFRONT_URL_REPORTS}
      - AWS_CLOUDFRONT_KEY_PAIR_ID=${AWS_CLOUDFRONT_KEY_PAIR_ID}
      - REDIS_URL=${REDIS_URL}
      - ALARM_LAMBDA_URL=${ALARM_LAMBDA_URL}
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-api.ssambee.com}
      - BACKEND_SERVICE_NAME=${BACKEND_SERVICE_NAME:-backend}
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - lms-network
    deploy:
      restart_policy:
        condition: on-failure

networks:
  lms-network:
    driver: overlay
    attachable: true
